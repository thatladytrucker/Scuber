<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scuber</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <header>
        <h1>SCUBER</h1>
        <p>Your Ride. Your Schedule. Your Community.</p>
    </header>


    <div class="map-placeholder">
        🗺️ Map Area
    </div>


    <div class="search-box">
        📍 Where are you going?
    </div>


    <button class="ride">
        🚗 Ride Now
        <span>Get picked up when a driver is available</span>
    </button>


    <button class="schedule">
        📅 Schedule a Ride
        <span>Book hours, days, or weeks in advance</span>
    </button>


    <button class="recurring">
        🔁 Recurring Rides
        <span>Set up rides that repeat automatically</span>
    </button>


</div>


<script src="app.js"></script>

</body>
</html>
