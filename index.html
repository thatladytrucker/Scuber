<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scuber</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<div id="account-screen">

    <header>
        <h1>SCUBER</h1>
        <p>Your Ride. Your Schedule. Your Community.</p>
    </header>


    <h2>Create Your Account</h2>


    <input 
    type="text" 
    id="name" 
    placeholder="Full Name">


    <input 
    type="email" 
    id="email" 
    placeholder="Email Address">


    <button class="ride" onclick="requestRide()">
    🚗 Ride Now
    <span>Get picked up when a driver is available</span>
</button>


    <button class="schedule" onclick="createAccount('driver'); showDriverScreen();">
        🚘 Continue as Driver
    </button>

</div>
<div id="driver-screen" class="hidden">

    <h2>Driver Availability</h2>

    <p>Tell Scuber when you are available for rides.</p>


    <label>Available Day</label>

    <select id="driver-day">
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>


    <label>Start Time</label>
    <input type="time" id="driver-start">


    <label>End Time</label>
    <input type="time" id="driver-end">


    <button class="confirm" onclick="saveAvailability()">
        Save Availability
    </button>

</div>
<div class="app hidden" id="main-app">

    <header>
        <h1>SCUBER</h1>
        <p>Your Ride. Your Schedule. Your Community.</p>
    </header>


    <div class="map-placeholder">
        🗺️ Map Area
    </div>


    <div class="search-box">
        📍 Where are you going?
    </div>


  <button class="schedule" onclick="openSchedule()">
    📅 Schedule a Ride
    <span>Book hours, days, or weeks in advance</span>
</button>


<div id="schedule-screen" class="hidden">

    <h2>Schedule Your Ride</h2>

    <label>Pickup Location</label>
    <input type="text" id="pickup" placeholder="Enter pickup location">


    <label>Destination</label>
    <input type="text" id="destination" placeholder="Where are you going?">


    <label>Date</label>
    <input type="date" id="ride-date">


    <label>Pickup Time</label>
    <input type="time" id="ride-time">


    <button class="confirm" onclick="confirmRide()">
        Confirm Scheduled Ride
    </button>

</div>


    <button class="schedule">
        📅 Schedule a Ride
        <span>Book hours, days, or weeks in advance</span>
    </button>


    <button class="recurring" onclick="openRecurring()">
    🔁 Recurring Rides
    <span>Set up rides that repeat automatically</span>
</button>


<div id="recurring-screen" class="hidden">

    <h2>Set Up Recurring Ride</h2>

    <label>Pickup Location</label>
    <input type="text" id="repeat-pickup" placeholder="Enter pickup location">


    <label>Destination</label>
    <input type="text" id="repeat-destination" placeholder="Where are you going?">


    <label>Repeat On</label>

    <select id="repeat-day">
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>


    <label>Pickup Time</label>
    <input type="time" id="repeat-time">


    <button class="confirm" onclick="confirmRecurring()">
        Save Recurring Ride
    </button>

</div>


</div>


<script src="app.js"></script>

</body>
</html>
